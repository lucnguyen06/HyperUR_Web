spring:
  application:
    name: hyperur-serial-backend

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080

app:
  mail:
    from: ${MAIL_USERNAME}
    admin: ${ADMIN_EMAIL:admin@hyperur.com}

# Create a .env file or set these environment variables:
# MAIL_USERNAME=your-email@gmail.com
# MAIL_PASSWORD=your-app-password (16-char app password from Google Account)
# ADMIN_EMAIL=notification-receiving-email@example.com
